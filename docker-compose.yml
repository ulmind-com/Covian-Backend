version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: premium_postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d app"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: premium_fastapi_web
    restart: always
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_SERVER=db  # Override server host to point to the docker container service 'db'
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=app
      - ENVIRONMENT=production
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Optional: mount app during local development to hot reload code changes
      - ./app:/app/app

volumes:
  postgres_data:
