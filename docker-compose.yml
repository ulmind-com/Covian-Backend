version: '3.8'

services:
  db:
    image: mongo:7.0
    container_name: corevita_mongo_db
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: corevita_fastapi_web
    restart: always
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URL=mongodb://db:27017/project_form_prem
      - MONGODB_DB_NAME=project_form_prem
      - ENVIRONMENT=production
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Mount app folder during development to hot-reload code changes
      - ./app:/app/app

volumes:
  mongo_data:
